<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xo | game</title>
    <link rel="stylesheet" href="../style-css/gamexo.css">
</head>

<body>
    <header>
        <div class="logo">
            <h1>xo <span id="game">Game</span></h1>
        </div>
        <div id="reset"><button id="resetbtn">reset</button></div>
    </header>
    <div id="leftBack">
        <p id="mode">Mode Offline</p>
        <div id="Back"><button id="backbtn"><a href="../index.html">⬅️Back</a></button></div>
    </div>
    <main>
        <div id="container">
            <div id="result">
                <p id="contentres">X is first playing</p>
            </div>
            <div id="indexes">
                <button class="indexempty" onclick="putxo(this.id)" id="1"></button>
                <button class="indexempty" onclick="putxo(this.id)" id="2"></button>
                <button class="indexempty" onclick="putxo(this.id)" id="3"></button>
                <button class="indexempty" onclick="putxo(this.id)" id="4"></button>
                <button class="indexempty" onclick="putxo(this.id)" id="5"></button>
                <button class="indexempty" onclick="putxo(this.id)" id="6"></button>
                <button class="indexempty" onclick="putxo(this.id)" id="7"></button>
                <button class="indexempty" onclick="putxo(this.id)" id="8"></button>
                <button class="indexempty" onclick="putxo(this.id)" id="9"></button>
            </div>
        </div>
        <div class="showscore">
            <p class="stringstyle">1st player(X): <span id="res1st">0</span></p>
            <p class="stringstyle">2st player(O): <span id="res2st">0</span></p>
        </div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="../javascript/gamexo.js"></script>
</body>

</html>
