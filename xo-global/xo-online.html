<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xo | game</title>
    <link rel="stylesheet" href="../style-css/gamexo.css">
    <link rel="stylesheet" href="../style-css/search.css">
</head>

<body>
    <header>
        <div class="logo">
            <h1>xo <span id="game">Game</span></h1>
        </div>
        <div id="reset"><button id="resetbtn">reset</button></div>
    </header>
    <div id="leftBack">
        <p id="mode">Mode Offline</p>
        <div id="Back"><button id="backbtn"><a href="../index.html">⬅️Back</a></button></div>
    </div>
    <main>
        <div id="container">
            <p id="valueCont">You are playing as: <span id="value"></span></p>
            <div id="result">
                <p id="contentres">X is first playing</p>
            </div>
            <div id="indexes">
                <button class="indexempty" id="1"></button>
                <button class="indexempty" id="2"></button>
                <button class="indexempty" id="3"></button>
                <button class="indexempty" id="4"></button>
                <button class="indexempty" id="5"></button>
                <button class="indexempty" id="6"></button>
                <button class="indexempty" id="7"></button>
                <button class="indexempty" id="8"></button>
                <button class="indexempty" id="9"></button>
            </div>
        </div>
        <div id="showscore">
            <p id="userCont" class="stringstyle">You: <span id="user"></span> <span>Your Score:</span> <span
                    id="res1st">0</span></p>
            <p id="oppNameCont" class="stringstyle">opponent: <span id="oppName"></span> <span>Opp Score:</span> <span
                    id="res2st">0</span></p>
        </div>
        <div class="loader"></div>
        <div class="input-box">
            <p id="mode">Mode Online</p>
            <label for="name">Enter your user name</label>
            <div class="search-container">
                <input type="text" placeholder="Enter your name..." id="name" required>
                <button id="find" class="search-btn" title="search player">
                    <span class="icon">🔍</span>
                    <span class="text">Search</span>
                </button>
            </div>
            <div id="Back"><button id="backbtn"><a href="../index.html">⬅️Back</a></button></div>
        </div>
    </main>

    <!-- Modal مخصص لطلب reset -->
    <div id="resetModal"
        style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 2px solid black; z-index: 1000; box-shadow: 0 0 10px black; text-align: center;">
        <p style="color: black;">The other player is requesting to reset the game. Do you agree?</p>
        <button id="acceptReset">Accept ✅</button>
        <button id="declineReset">Declined ❌</button>
    </div>
    <div id="modalOverlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;">
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let myRole;
        let name;
        let boxResult = document.getElementById('result');
        let contentofres = document.getElementById('contentres');

        const resetModal = document.getElementById('resetModal');
        const modalOverlay = document.getElementById('modalOverlay');
        let pendingGameId = null;

        function showResetModal(gameId) {
            pendingGameId = gameId;
            resetModal.style.display = 'block';
            modalOverlay.style.display = 'block';
        }

        function hideResetModal() {
            resetModal.style.display = 'none';
            modalOverlay.style.display = 'none';
            pendingGameId = null;
        }

        // ربط أزرار المودال
        document.getElementById('acceptReset').onclick = () => {
            if (pendingGameId) {
                socket.emit('resetResponse', { accept: true, gameId: pendingGameId });
                hideResetModal();
            }
        };

        document.getElementById('declineReset').onclick = () => {
            if (pendingGameId) {
                socket.emit('resetResponse', { accept: false, gameId: pendingGameId });
                hideResetModal();
            }
        };

        // استقبال طلب reset
        socket.on('resetRequest', (data) => {
            showResetModal(data.gameId);
        });

        socket.on('resetTimeout', () => {
            alert("The opponent did not respond to the reset request in a timely manner.");
        });

        // إخفاء العناصر في البداية
        document.getElementById('container').style.display = 'none';
        document.getElementById('showscore').style.display = 'none';
        document.getElementById('reset').style.display = 'none';
        document.getElementById('leftBack').style.display = 'none';
        document.getElementsByClassName('loader')[0].style.display = 'none';

        // البحث عن لاعب
        document.getElementById('find').addEventListener('click', function () {
            name = document.getElementById('name').value;
            if (name == null || name == "") {
                return alert("enter a name (is required!!)");
            } else {
                document.getElementById('user').innerText = name;
                socket.emit('find', { name: name });
                document.getElementsByClassName('loader')[0].style.display = 'block';
                document.querySelector('#name').disabled = true;
                document.querySelector('#find').disabled = true;
            }
        });

        socket.on('startGame', (data) => {
            document.querySelector('.loader').style.display = 'none';
            document.querySelector('.input-box').style.display = 'none';
            document.getElementById('container').style.display = 'block';
            document.getElementById('showscore').style.display = 'block';
            document.getElementById('reset').style.display = 'block';
            document.getElementById('leftBack').style.display = 'block';

            let game = data.game;
            let yourId = data.yourId;
            let me, opponent;
            if (game.p1.id === yourId) {
                me = game.p1;
                opponent = game.p2;
                myRole = 'p1';
            } else {
                me = game.p2;
                opponent = game.p1;
                myRole = 'p2';
            }
            document.getElementById('user').innerText = me.name;
            document.getElementById('oppName').innerText = opponent.name;
            document.getElementById('value').innerText = me.value;
        });

        // اللعب
        document.querySelectorAll('.indexempty').forEach(cell => {
            cell.addEventListener('click', function () {
                socket.emit('playing', { index: Number(cell.id) - 1 });
            });
        });

        socket.on('updateGame', (game) => {
            document.querySelectorAll('.indexempty').forEach(cell => {
                cell.innerText = '';
            });
            game.board.forEach((val, index) => {
                if (val) {
                    document.getElementById((index + 1).toString()).innerText = val;
                }
            });
            document.getElementById('contentres').innerText = game.turn + " turn";
        });

        socket.on('notYourTurn', () => alert("it's not your turn"));
        socket.on('cellTaken', () => alert("You cannot override"));
        socket.on('opponentLeft', () => {
            alert("The second player disconnected");
            location.reload();
        });

        socket.on('gameOver', (data) => {
            boxResult.classList.add('resultStyleAfterRound');
            if (data.result === 'draw') {
                for (let i = 0; i < 9; i++) {
                    document.getElementById(`${i + 1}`).classList.add("draw", "win-animate");
                }
                contentofres.textContent = 'Draw';
                MadeFnReload();
            } else {
                setTimeout(() => {
                    data.winner.pattern.forEach(i => {
                        document.getElementsByClassName('indexempty')[i].classList.add('rotate');
                    });
                }, 100);
                setTimeout(() => {
                    data.winner.pattern.forEach(i => {
                        document.getElementsByClassName('indexempty')[i].classList.add("winner", "win-animate");
                    });
                }, 300);
                contentofres.textContent = data.result + " wins 🎉";
                MadeFnReload();
            }
            if (myRole === 'p1') {
                document.getElementById('res1st').innerText = data.game.p1.score;
                document.getElementById('res2st').innerText = data.game.p2.score;
            } else {
                document.getElementById('res1st').innerText = data.game.p2.score;
                document.getElementById('res2st').innerText = data.game.p1.score;
            }
        });

        document.getElementById('resetbtn').addEventListener('click', () => {
            socket.emit('requestReset');
        });

        socket.on('resetDeclined', () => {
            alert("The other player declined to reset the game ❌");
        });

        socket.on('gameReset', (game) => {
            boxResult.classList.remove('resultStyleAfterRound');
            document.querySelectorAll('.indexempty').forEach(cell => {
                cell.innerText = '';
                cell.classList.remove("rotate", "winner", "win-animate", "draw");
            });
            document.getElementById('contentres').innerText = 'X turn';
            document.getElementById('res1st').innerText = 0;
            document.getElementById('res2st').innerText = 0;
        });

        function MadeFnReload() {
            let z = 0;
            setTimeout(() => { contentofres.textContent = 'Reloading'; }, 1000);
            let reloading = setInterval(() => {
                contentofres.textContent += '.';
                z++;
                if (z == 3) {
                    clearInterval(reloading);
                    boxResult.classList.remove('resultStyleAfterRound');
                    let cells = document.getElementsByClassName('indexempty');
                    for (let cell of cells) {
                        cell.textContent = "";
                        cell.classList.remove("rotate", "draw", "winner", "win-animate");
                    }
                    socket.emit('playAgain');
                }
            }, 1000);
        }
    </script>
</body>

</html>
